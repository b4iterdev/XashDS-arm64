name: Build ARM64 XashDS image

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  docker-build-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      XASH_RELEASE_TAG: continuous
      XASHDS_TARBALL: xashds-linux-arm64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/xashds-arm64
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=sha

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ARM64 image (PR validation)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          build-args: |
            XASH_RELEASE_TAG=${{ env.XASH_RELEASE_TAG }}
            XASHDS_TARBALL=${{ env.XASHDS_TARBALL }}
          push: false
          provenance: false
          sbom: false
          outputs: type=docker

      - name: Build and push ARM64 image (main/tags)
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          build-args: |
            XASH_RELEASE_TAG=${{ env.XASH_RELEASE_TAG }}
            XASHDS_TARBALL=${{ env.XASHDS_TARBALL }}
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
