name: Build ARM64 XashDS image

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  docker-build-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      XASH_RELEASE_TAG: continuous
      XASHDS_TARBALL: xashds-linux-arm64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          build-args: |
            XASH_RELEASE_TAG=${{ env.XASH_RELEASE_TAG }}
            XASHDS_TARBALL=${{ env.XASHDS_TARBALL }}
          push: false
          provenance: false
          sbom: false
          tags: cs16-xashds:arm64
          outputs: type=docker
